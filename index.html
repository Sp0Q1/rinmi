const cv = document.getElementById('game');

cx.imageSmoothingEnabled = true;
const W = 960, H = 540, TILE = 32, ROWS = 17;
const GRAV = 0.55, JUMP = -12.6;
function clamp(v,a,b){ return v<a?a:(v>b?b:v); }
function lerp(a,b,t){ return a+(b-a)*t; }

/* ---------------- Audio (kleine piepjes) ---------------- */
let actx = null;
function audio(){ if(!actx){ try{ actx = new (window.AudioContext||window.webkitAudioContext)(); }catch(e){} } return actx; }
function beep(freq, dur, type, vol, slide){
  const a = audio(); if(!a) return;
  try{
    const o = a.createOscillator(), g = a.createGain();
    o.type = type||'square'; o.frequency.value = freq;
    if(slide) o.frequency.linearRampToValueAtTime(slide, a.currentTime+dur);
    g.gain.value = vol||0.05;
    g.gain.exponentialRampToValueAtTime(0.0001, a.currentTime+dur);
    o.connect(g); g.connect(a.destination);
    o.start(); o.stop(a.currentTime+dur);
  }catch(e){}
}
const SFX = {
  munt:   ()=>beep(990,0.09,'square',0.04,1320),
  spring: ()=>beep(330,0.12,'triangle',0.05,520),
  slag:   ()=>beep(200,0.08,'sawtooth',0.04,120),
  raak:   ()=>beep(150,0.15,'sawtooth',0.05,80),
  au:     ()=>beep(180,0.2,'square',0.06,90),

/* ---------------- Input: toetsenbord ---------------- */
const keysDown = {};
let keysHit = {};
window.addEventListener('keydown', e=>{
  audio();
  const k = e.key.toLowerCase();
  if([' ','arrowup','arrowdown','arrowleft','arrowright','tab'].includes(k)) e.preventDefault();
  if(!e.repeat) keysHit[k] = true;
  keysDown[k] = true;
});
window.addEventListener('keyup', e=>{ keysDown[e.key.toLowerCase()] = false; });

/* ---------------- Input: touch (native gebaren) ----------------
   Linkerhelft  = zwevende joystick (lopen, en omhoog/omlaag voor zwemmen).
   Rechterhelft = gebaren: tik = aanval, veeg omhoog = springen (vasthouden = zweven),
                  veeg omlaag = je gave. Plus een paar grote HUD-knoppen.
------------------------------------------------------------------ */
const isTouch = ('ontouchstart' in window) || navigator.maxTouchPoints>0;
let uiButtons = [];     // menuknoppen (per scherm opnieuw gevuld)
let hudButtons = [];    // HUD-knoppen tijdens het spelen
const T = {
  joyId:null, baseX:0, baseY:0, curX:0, curY:0, axisX:0, up:false, down:false, active:false,
  rightId:null, rStartX:0, rStartY:0, rX:0, rY:0, rStartT:0, jumpHeld:false, swiped:false,
  hits:{}, ripples:[], hintGezien: localStorage.getItem('rinmi_touchhint')==='1',
};
function touchDownKey(k){
  if(k==='arrowleft'||k==='a') return T.axisX<0;
  if(k==='arrowright'||k==='d') return T.axisX>0;
  if(k==='arrowup'||k==='w'||k===' ') return T.jumpHeld || T.up;
  if(k==='arrowdown') return T.down;
  return false;
}
function hit(...ks){ return ks.some(k=>keysHit[k] || T.hits[k]); }
function down(...ks){ return ks.some(k=>keysDown[k] || touchDownKey(k)); }
function emitHit(k){ T.hits[k]=true; }

function canvasPos(t){
  const r = cv.getBoundingClientRect();
  return { x:(t.clientX-r.left)*(W/r.width), y:(t.clientY-r.top)*(H/r.height) };
}
function uiTapAt(x,y){
  for(const b of uiButtons){ if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){ b.fn(); return true; } }
  return false;
}
function hudTapAt(x,y){
  for(const b of hudButtons){ if(x>=b.x&&x<=b.x+b.w&&y>=b.y&&y<=b.y+b.h){ b.fn(); return true; } }
  return false;
}
const PLAYSTATES = { play:1, ride:1 };
function startTouch(id,x,y){
  if(PLAYSTATES[game.state]){
    if(!T.hintGezien){ T.hintGezien=true; localStorage.setItem('rinmi_touchhint','1'); }
    if(hudTapAt(x,y)) return;                 // gave / pauze / inventaris / wapen
    if(x < W*0.46 && T.joyId===null){         // linkerzone → joystick
      T.joyId=id; T.baseX=x; T.baseY=y; T.curX=x; T.curY=y; T.axisX=0; T.up=false; T.down=false; T.active=true;
    } else if(T.rightId===null){              // rechterzone → gebaren
      T.rightId=id; T.rStartX=x; T.rStartY=y; T.rX=x; T.rY=y; T.rStartT=game.tijd; T.swiped=false;
    }
  } else {
    uiTapAt(x,y);                             // menu's: meteen knop raken
  }
}
function moveTouch(id,x,y){
  if(id===T.joyId){
    T.curX=x; T.curY=y;
    const dx=x-T.baseX, dy=y-T.baseY;
    T.axisX = dx<-11 ? -1 : (dx>11 ? 1 : 0);
    T.up = dy<-18; T.down = dy>18;
  } else if(id===T.rightId){
    T.rX=x; T.rY=y;
    const dy=y-T.rStartY;
    if(!T.swiped){
      if(dy<-26){ T.swiped='up'; T.jumpHeld=true; emitHit('arrowup'); T.ripples.push({x,y,t:0.45,kind:'jump'}); }
      else if(dy>34){ T.swiped='down'; emitHit('s'); T.ripples.push({x,y,t:0.5,kind:'gave'}); }
    } else if(T.swiped==='up'){
      T.jumpHeld = dy < -8;                   // vinger omhoog houden = blijven zweven
    }
  }
}
function endTouch(id,x,y){
  if(id===T.joyId){ T.joyId=null; T.axisX=0; T.up=false; T.down=false; T.active=false; }
  else if(id===T.rightId){
    const dt=game.tijd-T.rStartT, dist=Math.hypot(x-T.rStartX,y-T.rStartY);
    if(!T.swiped && dist<22 && dt<0.32){ emitHit('x'); T.ripples.push({x,y,t:0.4,kind:'tap'}); }
    T.rightId=null; T.jumpHeld=false; T.swiped=false;
  }
}
cv.addEventListener('touchstart', e=>{ audio(); e.preventDefault();
  for(const t of e.changedTouches){ const p=canvasPos(t); startTouch(t.identifier,p.x,p.y); } }, {passive:false});
cv.addEventListener('touchmove', e=>{ e.preventDefault();
  for(const t of e.changedTouches){ const p=canvasPos(t); moveTouch(t.identifier,p.x,p.y); } }, {passive:false});
cv.addEventListener('touchend', e=>{ e.preventDefault();
  for(const t of e.changedTouches){ const p=canvasPos(t); endTouch(t.identifier,p.x,p.y); } }, {passive:false});
cv.addEventListener('touchcancel', e=>{
  for(const t of e.changedTouches){ endTouch(t.identifier,T.curX,T.curY); } }, {passive:false});

/* ---------------- Kaart-hulpjes ---------------- */
function makeGrid(w){ const g=[]; for(let y=0;y<ROWS;y++) g.push(new Array(w).fill(' ')); return g; }
function grond(g,x0,x1,top){ for(let x=x0;x<=x1;x++) for(let y=top;y<ROWS;y++) g[y][x]='#'; }
function water(g,x0,x1,top){ for(let x=x0;x<=x1;x++) for(let y=top;y<ROWS;y++) g[y][x]='W'; }
function plat(g,x0,x1,y){ for(let x=x0;x<=x1;x++) g[y][x]='='; }
function muur(g,x,y0,y1){ for(let y=y0;y<=y1;y++) g[y][x]='#'; }
function S(g,x,y,c){ g[y][x]=c; }

function laadLevel(key){

    doel:def.doel, doelTekst:def.doelTekst,

  game.enemies=[]; game.items=[]; game.projs=[]; game.traps=[];

  game.boss=null; game.bossDood=0;
  const g = def.grid;
  for(let y=0;y<ROWS;y++) for(let x=0;x<def.w;x++){
    const c = g[y][x], px = x*TILE, py = y*TILE;
    const bodem = py+TILE; // onderkant van de tegel
    switch(c){
      case 'P': game.player.x = px+5; game.player.y = bodem - game.player.h; g[y][x]=' '; break;

      case 'l': game.items.push({type:'levens', x:px+6, y:py+6, w:20, h:20}); g[y][x]=' '; break;
      case 'f': game.items.push({type:'eten', x:px+6, y:py+6, w:20, h:20}); g[y][x]=' '; break;
      case 'w': game.items.push({type:'water', x:px+8, y:py+4, w:16, h:24}); g[y][x]=' '; break;
      case 's': game.items.push({type:'steen', x:px+8, y:py+10, w:18, h:16}); game.level.stenen++; g[y][x]=' '; break;
      case 'C': game.items.push({type:'kooi', x:px-4, y:bodem-52, w:40, h:52, hp:3}); game.level.kooien++; g[y][x]=' '; break;
      case 'X': game.items.push({type:'uitgang', x:px, y:bodem-64, w:32, h:64}); g[y][x]=' '; break;
      case 'd': game.enemies.push(maakVijand('pop', px, bodem)); game.level.poppen++; g[y][x]=' '; break;

/* ---------------- Tegels & botsing ---------------- */
function tile(tx,ty){
  const L = game.level;
  if(!L || tx<0 || tx>=L.w) return '#';
  if(ty<0 || ty>=ROWS) return ' ';
  return L.grid[ty][tx];
}
function tileAtPx(px,py){ return tile(Math.floor(px/TILE), Math.floor(py/TILE)); }
function solidChar(c){ return c==='#'||c==='='||c==='R'; }   // telt als 'grond' (detectie/projectielen)
function fullSolid(c){ return c==='#'||c==='R'; }            // blokkeert van alle kanten
function solidAt(px,py){ return solidChar(tileAtPx(px,py)); }

// '=' platforms zijn éénrichting: je springt er van onderaf doorheen en landt erbovenop.
function moveCollide(e, f){
  // horizontaal — alleen volledig vaste tegels blokkeren
  e.x += e.vx*f;
  if(e.vx>0){
    const tx = Math.floor((e.x+e.w)/TILE);
    for(let ty=Math.floor(e.y/TILE); ty<=Math.floor((e.y+e.h-1)/TILE); ty++){
      if(fullSolid(tile(tx,ty))){ e.x = tx*TILE - e.w - 0.01; e.vx=0; e.muur=1; break; }
    }
  } else if(e.vx<0){
    const tx = Math.floor(e.x/TILE);
    for(let ty=Math.floor(e.y/TILE); ty<=Math.floor((e.y+e.h-1)/TILE); ty++){
      if(fullSolid(tile(tx,ty))){ e.x = (tx+1)*TILE + 0.01; e.vx=0; e.muur=-1; break; }
    }
  }
  // verticaal
  const prevBottom = e.y + e.h;
  e.y += e.vy*f;
  e.onGround = false;
  if(e.vy>0){
    const ty = Math.floor((e.y+e.h)/TILE);
    for(let tx=Math.floor(e.x/TILE); tx<=Math.floor((e.x+e.w-1)/TILE); tx++){
      const c = tile(tx,ty);
      if(c==='#'||c==='R'){ e.y = ty*TILE - e.h - 0.01; e.vy=0; e.onGround=true; break; }
      if(c==='='){ // alleen landen als je van bovenaf komt en niet bewust doorzakt
        if(!e.dropThrough && prevBottom <= ty*TILE + 8){ e.y = ty*TILE - e.h - 0.01; e.vy=0; e.onGround=true; break; }
      }
    }
  } else if(e.vy<0){
    const ty = Math.floor(e.y/TILE);
    for(let tx=Math.floor(e.x/TILE); tx<=Math.floor((e.x+e.w-1)/TILE); tx++){
      if(fullSolid(tile(tx,ty))){ e.y = (ty+1)*TILE + 0.01; e.vy=0; break; }
    }
  }
  // onder de kaart: onzichtbare vloer
  const mapH = ROWS*TILE;
  if(e.y+e.h > mapH){ e.y = mapH-e.h; e.vy=0; e.onGround=true; }
}
function overlap(a,b){ return a.x<b.x+b.w && a.x+a.w>b.x && a.y<b.y+b.h && a.y+a.h>b.y; }

/* ---------------- Effecten ---------------- */
function poef(x,y,kleur,n){
  for(let i=0;i<(n||10);i++){
    const a = (i/(n||10))*Math.PI*2;
    game.parts.push({x,y, vx:Math.cos(a)*(1.5+i%3), vy:Math.sin(a)*(1.5+i%2)-1,
      life:0.6+(i%4)*0.1, kleur, size:3+(i%3)});
  }
}
function sterren(x,y){
  for(let i=0;i<8;i++){
    const a = i/8*Math.PI*2;
    game.parts.push({x,y, vx:Math.cos(a)*2.4, vy:Math.sin(a)*2.4-1.5,
      life:0.8, kleur:'#ffe066', size:4, ster:true});
  }
}
function floater(x,y,tekst,kleur){
  game.floaters.push({x,y,tekst,kleur:kleur||'#fff',t:1.4});
}
function schud(n){ game.shake = Math.min(14, Math.max(game.shake, n)); }
function hitstop(s){ game.hitstop = Math.max(game.hitstop, s); }

/* ---------------- Camera (zacht + vooruitkijken) ---------------- */
function updateCamera(dt){
  const p = game.player, f = dt*60;
  const mapW = game.level.w*TILE;
  const lead = p.facing*64 + clamp(p.vx*7,-30,30);
  const tx = clamp(p.x+p.w/2 - W/2 + lead, 0, Math.max(0,mapW-W));
  const ty = clamp(p.y+p.h/2 - H/2 - 20, 0, Math.max(0,ROWS*TILE-H));
  const k = 1 - Math.pow(0.80, f);
  game.camX += (tx-game.camX)*k;
  game.camY += (ty-game.camY)*k;
  if(game.shake>0) game.shake = Math.max(0, game.shake - dt*26);
}
function snapCamera(){
  const p = game.player, mapW = game.level.w*TILE;
  game.camX = clamp(p.x+p.w/2 - W/2, 0, Math.max(0,mapW-W));
  game.camY = clamp(p.y+p.h/2 - H/2 - 20, 0, Math.max(0,ROWS*TILE-H));
}

/* ---------------- Sfeer: kersenbloesem, stof & vonken ---------------- */
const SFEER = [];
function nieuwPetal(rand){
  return { x:Math.random()*W, y: rand? Math.random()*H : -12-Math.random()*40,
    vx:-0.25-Math.random()*0.7, vy:0.35+Math.random()*0.8,
    rot:Math.random()*6.28, vr:(Math.random()-0.5)*0.08,
    size:4+Math.random()*5, sway:Math.random()*6.28, ph:Math.random() };
}
for(let i=0;i<30;i++) SFEER.push(nieuwPetal(true));
function updateSfeer(dt){
  const f = dt*60;
  for(const s of SFEER){
    s.sway += 0.035*f;
    s.x += (s.vx + Math.sin(s.sway)*0.55)*f;
    s.y += s.vy*f;
    s.rot += s.vr*f;
    if(s.y>H+14 || s.x<-18){ Object.assign(s, nieuwPetal(false)); s.x = Math.random()*(W+40); }
  }
}
function tekenSfeer(theme){
  let kleuren, alpha=0.85, schaal=1, omhoog=false;
  if(theme==='grot'){ kleuren=['#9ab4e0','#6f86c0']; alpha=0.35; schaal=0.6; }
  else if(theme==='arena'){ kleuren=['#ffd27a','#ff9a4a','#ffec9a']; alpha=0.75; omhoog=true; }
  else { kleuren=['#ffd4e6','#f7b8d6','#ffe1ee','#fcc8de']; alpha=0.9; }
  for(const s of SFEER){
    const y = omhoog ? (H - s.y) : s.y;
    cx.save();
    cx.globalAlpha = alpha * (0.6+0.4*Math.sin(s.sway*1.3));
    cx.translate(s.x, y);
    cx.rotate(s.rot);
    cx.fillStyle = kleuren[(s.size|0)%kleuren.length];
    const w = s.size*schaal, h = s.size*0.62*schaal;
    if(theme==='grot'||theme==='arena'){
      cx.beginPath(); cx.ellipse(0,0,w*0.5,w*0.5,0,0,7); cx.fill();
    } else {
      // klein bloesemblaadje
      cx.beginPath();
      cx.moveTo(0,-h); cx.quadraticCurveTo(w,-h*0.3, 0,h);
      cx.quadraticCurveTo(-w,-h*0.3, 0,-h); cx.fill();
    }
    cx.restore();
  }
  cx.globalAlpha = 1;
}

/* ---------------- Vignet ---------------- */
let _vig=null;
function tekenVignet(sterkte){
  if(!_vig){
    _vig = cx.createRadialGradient(W/2,H*0.46,H*0.34, W/2,H*0.5,H*0.92);
    _vig.addColorStop(0,'rgba(0,0,0,0)');
    _vig.addColorStop(1,'rgba(0,0,0,0.42)');
  }
  cx.globalAlpha = sterkte==null?1:sterkte;
  cx.fillStyle=_vig; cx.fillRect(0,0,W,H);
  cx.globalAlpha = 1;
}

/* ---------------- XP / niveau ---------------- */
function geefXp(n){
  const p = game.player;
  p.xp += n;
  if(p.xp >= xpNodig(p)){
    p.xp -= xpNodig(p);
    p.niveau++;
    SFX.niveau();
    game.state='levelup';
  }
}

/* ---------------- Schade ---------------- */
function raakVijand(e, dmg, kbDir){
  e.hp -= dmg; e.flash = 0.15; e.stun = 0.25;
  e.vx = (kbDir||0)*3;
  floater(e.x+e.w/2, e.y-6, '-'+Math.round(dmg), '#ffd');
  SFX.raak();
  if(e.hp<=0) verslaVijand(e);
}
function verslaVijand(e){
  e.dood = true;
  sterren(e.x+e.w/2, e.y+e.h/2);
  poef(e.x+e.w/2, e.y+e.h/2, '#aab', 8);
  schud(e.type==='generaal'?6:2); hitstop(0.03);
  if(VIJANDQUIPS[e.type] && Math.random()<0.5)
    floater(e.x+e.w/2, e.y-52, VIJANDQUIPS[e.type][(Math.random()*VIJANDQUIPS[e.type].length)|0], '#cdf');
  SFX.poef();
  const p = game.player;
  p.score += e.xp;
  if(e.munDrop>0){ p.mun += e.munDrop; floater(e.x+e.w/2, e.y-22, '+'+e.munDrop+' mun', '#ffd700'); }
  floater(e.x+e.w/2, e.y-38, '+'+e.xp+' XP', '#8cf');
  if(e.type==='pop' && game.level.doel==='training') game.level.poppen--;
  geefXp(e.xp);
}
function raakSpeler(dmg, vanX){
  const p = game.player;
  if(p.invuln>0 || p.dashT>0) return;
  p.hp -= dmg; p.invuln = 1.1;
  p.vx = (p.x+p.w/2 < vanX ? -4 : 4); p.vy = -3;
  floater(p.x+p.w/2, p.y-10, 'Au!', '#f88');
  schud(5); hitstop(0.04);
  SFX.au();
  if(p.hp<=0) sterf();
}
function sterf(){
  const p = game.player;
  p.levens--;
  poef(p.x+p.w/2, p.y+p.h/2, '#fff', 16);
  if(p.levens<=0){
    if(p.score>game.hi){ game.hi=p.score; localStorage.setItem('rinmi_hi',''+game.hi); }
    game.state='gameover';
  } else {
    // herstart huidig level, spullen blijven
    p.hp = p.maxHp; p.honger = Math.max(p.honger,70);
    const cur = FLOW[game.flowIdx];
    if(cur && cur.type==='ride'){
      game.ride = bouwRit(); game.state='ride';
      floater(220, 340, 'Nog '+p.levens+' levens!', '#fff');
    } else {
      if(cur && cur.type==='level') laadLevel(cur.key);
      floater(p.x+p.w/2, p.y-20, 'Nog '+p.levens+' levens!', '#fff');
    }
  }
}

/* ---------------- Aanvallen ---------------- */
function valAan(){
  const p = game.player;
  if(p.atkCd>0) return;
  const wk = p.wapens[p.wapenIdx], wpn = WAPENS[wk];
  p.atkCd = wpn.cd; p.atkAnim = 0.18;
  const dmg = wpn.dmg * dmgMult(p);
  SFX.slag();
  if(wpn.type==='melee'){
    meleeHit({x: p.facing>0 ? p.x+p.w : p.x-wpn.reik, y:p.y, w:wpn.reik, h:p.h}, dmg, p.facing);
  } else if(wpn.type==='spin'){
    meleeHit({x:p.x-wpn.reik, y:p.y-4, w:p.w+wpn.reik*2, h:p.h+8}, dmg, p.facing);
  } else if(wpn.type==='pijl'){
    game.projs.push({type:'pijl', vriend:true, x:p.x+p.w/2, y:p.y+14, w:14, h:4,
      vx:10*p.facing, vy:0, grav:0.02, dmg, t:2});
  } else if(wpn.type==='steen'){
    game.projs.push({type:'steen', vriend:true, x:p.x+p.w/2, y:p.y+8, w:12, h:12,
      vx:6.5*p.facing, vy:-5.5, grav:0.35, dmg, t:3});
  }
}
function meleeHit(rect, dmg, dir){
  for(const e of game.enemies) if(!e.dood && overlap(rect,e)) raakVijand(e,dmg,dir);
  if(game.boss && !game.boss.dood && overlap(rect,game.boss)) raakBaas(dmg);
  for(const it of game.items){
    if(it.type==='kooi' && !it.open && overlap(rect,it)) raakKooi(it);
  }
}
function raakKooi(it){
  it.hp--;
  poef(it.x+it.w/2, it.y+it.h/2, '#cb9', 6);
  SFX.raak();
  if(it.hp<=0){
    it.open = true;
    game.level.kooien--;
    game.player.score += 100;
    game.gevangenen.push({x:it.x+8, y:it.y+it.h-40, t:3});
    floater(it.x+it.w/2, it.y-10, 'Bevrijd! +100', '#9f9');
    SFX.open();
    geefXp(15);
  }
}
function raakBaas(dmg){
  const b = game.boss;
  b.hp -= dmg; b.flash = 0.15;
  floater(b.x+b.w/2, b.y-8, '-'+Math.round(dmg), '#ffd');
  SFX.raak();
  schud(5);
  if(b.hp<=0 && !b.dood){
    b.dood = true; game.bossDood = 2.2;
    game.player.score += 300;
    poef(b.x+b.w/2, b.y+b.h/2, '#a5f', 24);
    schud(13); hitstop(0.12);
    SFX.boss();
    floater(b.x+b.w/2, b.y-20, 'Akuma is verslagen!', '#fff');
    geefXp(300);
  }
}

/* ---------------- Gaven ---------------- */
function gebruikGave(){
  const p = game.player;
  if(p.gaveCd>0) return;
  const c = CHARS[p.charKey];
  p.gaveCd = c.gaveCd;
  SFX.gave();
  if(p.charKey==='rinmi'){
    floater(p.x+p.w/2, p.y-16, 'Nae ai!', '#6cf');
    for(const d of [-1,1]){
      game.projs.push({type:'golf', vriend:true, x:p.x+p.w/2, y:p.y+10, w:26, h:30,
        vx:5*d, vy:0, grav:0, dmg:16*dmgMult(p), t:1.4, geraakt:[]});
    }
    p.hp = Math.min(p.maxHp, p.hp+6);
  } else if(p.charKey==='kana'){
    p.dashT = 0.28; p.vx = 15*p.facing;
    floater(p.x+p.w/2, p.y-16, 'Bliksem!', '#f66');
  } else if(p.charKey==='yuna'){
    if(game.traps.length>=3){ game.traps.shift(); }
    game.traps.push({x:p.x+p.facing*26, y:p.y+p.h-10, w:26, h:10});
    floater(p.x+p.w/2, p.y-16, 'Valstrik!', '#9d6');
  } else if(p.charKey==='qingfei'){
    floater(p.x+p.w/2, p.y-16, 'Windvlaag!', '#cef');
    const rect = {x:p.x-130, y:p.y-40, w:260+p.w, h:p.h+80};
    for(const e of game.enemies){
      if(!e.dood && overlap(rect,e)){
        const d = e.x > p.x ? 1 : -1;
        e.vx = 8*d; e.vy = -3; e.stun = 0.6;
        raakVijand(e, 6*dmgMult(p), d);
      }
    }
    poef(p.x+p.w/2, p.y+p.h/2, '#dff', 14);
  } else if(p.charKey==='seojin'){
    floater(p.x+p.w/2, p.y-16, 'Nae ai!', '#db9');
    if(!duwRots()){
      // tijdelijke rots voor haar voeten
      const tx = Math.floor((p.x+p.w/2)/TILE) + p.facing;
      const ty = Math.floor((p.y+p.h-1)/TILE);
      if(tile(tx,ty)===' '){
        game.level.grid[ty][tx] = 'R';
        game.tempRocks.push({tx,ty,t:6});
        poef(tx*TILE+16, ty*TILE+16, '#b97', 8);
      }
    }
  }
}
function duwRots(){
  const p = game.player;
  const ptx = Math.floor((p.x+p.w/2)/TILE);
  const top = Math.floor(p.y/TILE), bot = Math.floor((p.y+p.h-1)/TILE);
  for(let d=1; d<=2; d++){
    const tx = ptx + d*p.facing;
    for(let ty=bot; ty>=top-1; ty--){
      if(tile(tx,ty)==='R'){
        const ntx = tx + p.facing;
        if(tile(ntx,ty)===' '){
          game.level.grid[ty][tx] = ' ';
          game.level.grid[ty][ntx] = 'R';
          // verplaats eventueel ook de tijdelijke-rots-registratie
          for(const tr of game.tempRocks) if(tr.tx===tx && tr.ty===ty){ tr.tx=ntx; }
          poef(ntx*TILE+16, ty*TILE+16, '#b97', 10);
          SFX.poef();
          return true;
        }
      }
    }
  }
  return false;
}

/* ---------------- Eten & drinken ---------------- */
function eet(){
  const p = game.player;
  if(p.inv.eten<=0){ floater(p.x+p.w/2,p.y-12,'Geen etenspakket!','#faa'); SFX.fout(); return; }
  if(p.honger>=99){ floater(p.x+p.w/2,p.y-12,'Geen honger!','#ddd'); return; }
  p.inv.eten--; p.honger = Math.min(100, p.honger+55);
  floater(p.x+p.w/2,p.y-12,'Mmm! Honger +55','#fc6'); SFX.eet();
}
function drink(){
  const p = game.player;
  if(p.inv.water<=0){ floater(p.x+p.w/2,p.y-12,'Geen waterfles!','#faa'); SFX.fout(); return; }
  p.inv.water--; p.hp = Math.min(p.maxHp, p.hp+30);
  floater(p.x+p.w/2,p.y-12,'Slok water! HP +30','#6cf'); SFX.eet();
}
function gebruikLevensmiddel(){
  const p = game.player;
  if(p.inv.levens<=0){ floater(p.x+p.w/2,p.y-12,'Geen levensmiddel!','#faa'); SFX.fout(); return; }
  p.inv.levens--; p.hp = p.maxHp; p.honger = Math.min(100,p.honger+25);
  floater(p.x+p.w/2,p.y-12,'Levensmiddel! Helemaal beter!','#9f9'); SFX.niveau();
}

/* ---------------- Speler-update ---------------- */
function updateSpeler(dt){
  const p = game.player, f = dt*60;
  const c = CHARS[p.charKey];
  const inWater = tileAtPx(p.x+p.w/2, p.y+p.h/2)==='W';

  // sprong-gevoel: coyote-tijd (nog even springen na de rand) + jump-buffer
  p.coyote = p.onGround ? 0.10 : Math.max(0,(p.coyote||0)-dt);
  if(hit('arrowup','w',' ')) p.jumpBuf = 0.12; else p.jumpBuf = Math.max(0,(p.jumpBuf||0)-dt);

  // lopen
  let spd = 3.1*speedMult(p);
  if(inWater) spd *= (p.charKey==='rinmi'?1.1:0.55);
  if(p.dashT>0){ p.dashT -= dt; }
  else {
    if(down('arrowleft','a')){ p.vx = -spd; p.facing=-1; p.loopT += dt; }
    else if(down('arrowright','d')){ p.vx = spd; p.facing=1; p.loopT += dt; }
    else { p.vx *= 0.7; if(Math.abs(p.vx)<0.05) p.vx = 0; }
  }
  if(p.dashT>0){
    // Kana-dash raakt vijanden
    const rect = {x:p.x-6,y:p.y,w:p.w+12,h:p.h};
    for(const e of game.enemies){
      if(!e.dood && !e.dashGeraakt && overlap(rect,e)){
        e.dashGeraakt = true; raakVijand(e, 22*dmgMult(p), p.facing);
      }
    }
    if(game.boss && !game.boss.dood && overlap(rect,game.boss) && !game.boss.dashGeraakt){
      game.boss.dashGeraakt = true; raakBaas(20*dmgMult(p));
    }
    game.parts.push({x:p.x+p.w/2,y:p.y+p.h/2,vx:-p.facing*2,vy:0,life:0.3,kleur:'#f55',size:5});
  } else {
    for(const e of game.enemies) e.dashGeraakt = false;
    if(game.boss) game.boss.dashGeraakt = false;
  }

  // aan het oppervlak? (lucht net boven het hoofd) — dan kun je uit het water klauteren
  const oppervlak = inWater && tileAtPx(p.x+p.w/2, p.y-3)!=='W';
  // zwemmen / zwaartekracht
  if(inWater && p.charKey==='rinmi'){
    p.swim = true;
    if(down('arrowup','w',' ')) p.vy -= 0.5*f;        // omhoog zwemmen
    else if(down('arrowdown','s')) p.vy += 0.4*f;     // duiken
    else p.vy -= 0.15*f;                              // licht drijfvermogen naar het oppervlak
    p.vy = Math.max(-3.6, Math.min(3.2, p.vy))*Math.pow(0.92,f);
    // bij het oppervlak: springen = uit het water klauteren op de kant
    if(oppervlak && hit('arrowup','w',' ')){ p.vy = -10.5; SFX.spring(); }
    p.waterT += dt;
    if(p.waterT>0.4){ p.waterT=0;
      if(p.hp<p.maxHp){ p.hp=Math.min(p.maxHp,p.hp+1.5);
        game.parts.push({x:p.x+p.w/2,y:p.y,vx:0,vy:-1,life:0.5,kleur:'#8df',size:3}); }
    }
  } else {
    p.swim = false;
    if(inWater){
      // andere meiden: water duwt ze stevig omhoog en doet een beetje zeer
      p.vy = Math.min(p.vy, 1.0); p.vy -= 0.45*f;
      p.waterDmgT += dt;
      if(p.waterDmgT>0.75){ p.waterDmgT=0; p.hp -= 3;
        floater(p.x+p.w/2,p.y-8,'Brr!','#8cf');
        if(p.hp<=0){ sterf(); return; } }
      // uit het water springen (sterker, zodat je de kant haalt)
      if(hit('arrowup','w',' ')) p.vy = -10.5;
    } else {
      p.vy += GRAV*f;
      if(p.coyote>0 && p.jumpBuf>0){ p.vy = JUMP; p.coyote=0; p.jumpBuf=0; SFX.spring();
        poef(p.x+p.w/2, p.y+p.h, '#e8f4ff', 5); }
      // Qingfei zweeft
      if(p.charKey==='qingfei' && !p.onGround && p.vy>1.4 && down('arrowup','w',' ')){
        p.vy = 1.4; p.glijT += dt;
        if(Math.floor(p.glijT*10)%3===0)
          game.parts.push({x:p.x+p.w/2+(p.glijT*50%14)-7,y:p.y+p.h,vx:0,vy:1,life:0.3,kleur:'#cef',size:2});
      }
    }
  }
  // uit het water klauteren: zwem tegen een randje op gelijke hoogte aan → omhoog geduwd
  if(inWater){
    const dir = down('arrowleft','a') ? -1 : (down('arrowright','d') ? 1 : 0);
    if(dir!==0){
      const fcol = Math.floor((dir>0 ? p.x+p.w+3 : p.x-3)/TILE);
      const footRow = Math.floor((p.y+p.h-4)/TILE);
      if(fullSolid(tile(fcol, footRow)) && !fullSolid(tile(fcol, footRow-1)) && p.vy>-6){
        p.vy = -6; // klauter het randje op
      }
    }
  }
  p.vy = Math.min(p.vy, 14);
  // door één-richtingsplatform zakken door ↓ vast te houden (kort venster)
  if(down('arrowdown') && p.onGround && !inWater) p.dropT = 0.2;
  p.dropThrough = (p.dropT||0) > 0;
  p.dropT = Math.max(0,(p.dropT||0)-dt);
  moveCollide(p, f);

  // doornstruiken
  const voetTile = tileAtPx(p.x+p.w/2, p.y+p.h-6);
  if(voetTile==='^' && p.dorenT<=0){ p.dorenT = 0.8; raakSpeler(5, p.x+p.w/2 - p.facing*10); }
  p.dorenT -= dt;

  // acties
  if(hit('x','j')) valAan();
  if(hit('c','k')){ p.wapenIdx = (p.wapenIdx+1)%p.wapens.length;
    floater(p.x+p.w/2,p.y-14,WAPENS[p.wapens[p.wapenIdx]].naam,'#fff'); }
  if(hit('s','shift') && !inWater) gebruikGave();
  if(hit('s','shift') && inWater && p.charKey!=='rinmi') gebruikGave();
  if(hit('1')) eet();
  if(hit('2')) drink();
  if(hit('3')) gebruikLevensmiddel();

  // honger
  p.honger -= dt*100/240;
  if(p.honger<35 && !game.hintHonger){ game.hintHonger=true;
    floater(p.x+p.w/2,p.y-30, isTouch?'Je hebt honger! Tik op de 🍙-knop!':'Je hebt honger! Druk op 1 om te eten!','#fc6'); }
  if(p.honger<=0){
    p.honger = 0;
    p.hongerT = (p.hongerT||0)+dt;
    if(p.hongerT>1){ p.hongerT=0; p.hp -= 4;
      floater(p.x+p.w/2,p.y-12,'Honger!','#f86');
      if(p.hp<=0){ sterf(); return; } }
  }

  p.atkCd -= dt; p.atkAnim -= dt; p.gaveCd -= dt; p.invuln -= dt;

  // voorwerpen oppakken
  for(const it of game.items){
    if(it.gepakt || it.type==='oma' || it.type==='uitgang' || it.type==='kooi') continue;
    if(overlap(p,it)){
      it.gepakt = true;
      if(it.type==='munt'){ p.mun+=5; p.score+=10; floater(it.x,it.y-8,'+5 mun','#ffd700'); SFX.munt(); }
      else if(it.type==='levens'){ p.inv.levens=Math.min(9,p.inv.levens+1);
        floater(it.x,it.y-8,'Levensmiddel! +1','#9f9');
        floater(it.x,it.y-26,'"Ooit heb je dit nodig," zei oma','#9f9'); SFX.munt(); }
      else if(it.type==='eten'){ p.inv.eten=Math.min(9,p.inv.eten+1);
        floater(it.x,it.y-8, ['Hangwa! +1','Yakgwa! +1','Tteokbokki! +1','Nashi-peer! +1'][(Math.random()*4)|0], '#fc6'); SFX.munt(); }
      else if(it.type==='water'){ p.inv.water=Math.min(9,p.inv.water+1); floater(it.x,it.y-8,'Waterfles! +1','#6cf'); SFX.munt(); }
      else if(it.type==='steen'){ game.level.stenen--; p.score+=25;
        floater(it.x,it.y-8,'Trainingssteen!','#ddd'); SFX.munt(); geefXp(10); }
    }
  }

  // oma — opent vanzelf als je dichtbij komt (werkt ook op touch), of opnieuw met E
  const oma = game.items.find(i=>i.type==='oma');
  if(oma){
    const dichtbij = Math.abs((oma.x+14)-(p.x+p.w/2))<54;
    if((dichtbij && !oma.gesproken) || (dichtbij && hit('e'))){
      const i = oma.gesproken ? 1 : 0;
      oma.gesproken = true;
      game.dialog = { regels: omaRegels(i) };
      game.state='dialog';
      keysHit = {};
    }
  }

  // uitgang
  const uit = game.items.find(i=>i.type==='uitgang');
  if(uit && overlap(p,uit) && doelKlaar()){
    p.score += 250;
    volgendeFase();
    return;
  }

  // tas/statistieken
  if(hit('tab','i')){ game.state='stats'; keysHit = {}; }

  // camera
  updateCamera(dt);
}
function doelKlaar(){
  const L = game.level;
  if(L.doel==='training') return L.stenen<=0 && L.poppen<=0;
  if(L.doel==='kooien') return L.kooien<=0;
  if(L.doel==='bereik') return true;
  return false;
}

/* ---------------- Vijand-update ---------------- */
function updateVijand(e, dt){
  const p = game.player, f = dt*60;
  e.flash -= dt; e.stun -= dt;
  if(e.type==='pop'){ e.wob += dt*4; return; }
  e.vy += GRAV*f;
  const dist = Math.abs((e.x+e.w/2)-(p.x+p.w/2));
  const zelfdeHoogte = Math.abs(e.y-p.y)<80;
  if(e.type==='schutter'){
    e.vy = Math.min(e.vy, 10);
    moveCollide(e, f);
    e.dir = p.x > e.x ? 1 : -1;
    e.schietCd -= dt;
    if(dist<440 && e.schietCd<=0){
      e.schietCd = 2.2;
      const dx = (p.x+p.w/2)-(e.x+e.w/2), dy = (p.y+10)-(e.y+10);
      const len = Math.max(1,Math.hypot(dx,dy));
      game.projs.push({type:'pijl', vriend:false, x:e.x+e.w/2, y:e.y+12, w:14, h:4,
        vx:dx/len*5.5, vy:dy/len*5.5-1, grav:0.08, dmg:7, t:3});
      beep(300,0.1,'triangle',0.03,200);
    }
  } else {
    if(e.stun<=0){
      const aggro = e.type==='generaal' ? 340 : 230;
      if(dist<aggro && zelfdeHoogte) e.dir = p.x > e.x ? 1 : -1;
      // niet van richels aflopen tijdens patrouille
      const voorX = e.dir>0 ? e.x+e.w+4 : e.x-4;
      if(e.onGround && !solidAt(voorX, e.y+e.h+6) && !(dist<aggro&&zelfdeHoogte)) e.dir *= -1;
      if(e.muur) { e.dir = -e.muur; e.muur = 0; }
      e.vx = e.dir * e.snel;
    } else e.vx *= 0.85;
    moveCollide(e, f);
    // contact
    if(overlap(e,p)) raakSpeler(e.dmg, e.x+e.w/2);
  }
}

/* ---------------- Baas-update ---------------- */
function updateBaas(dt){
  const b = game.boss, p = game.player, f = dt*60;
  if(b.dood){
    game.bossDood -= dt;
    if(game.bossDood<=0){ p.score+=500; volgendeFase(); }
    return;
  }
  b.flash -= dt;
  b.vy += GRAV*f;
  b.dir = p.x > b.x ? 1 : -1;
  const dist = Math.abs((b.x+b.w/2)-(p.x+p.w/2));
  if(b.dashT>0){ b.dashT -= dt; b.vx = b.dir*6.5; }
  else if(dist>150) b.vx = b.dir*1.3;
  else b.vx *= 0.8;
  moveCollide(b, f);
  // schaduwbollen
  b.orbCd -= dt;
  if(b.orbCd<=0){
    b.orbCd = 2.4;
    const dx = (p.x+p.w/2)-(b.x+b.w/2), dy = (p.y+14)-(b.y+20);
    const len = Math.max(1,Math.hypot(dx,dy));
    game.projs.push({type:'orb', vriend:false, x:b.x+b.w/2, y:b.y+20, w:16, h:16,
      vx:dx/len*4.5, vy:dy/len*4.5, grav:0, dmg:12, t:3.5});
    beep(110,0.2,'sawtooth',0.05,70);
  }
  // dash
  b.dashCd -= dt;
  if(b.dashCd<=0 && Math.abs(b.y-p.y)<60){ b.dashCd = 6; b.dashT = 0.6; schud(7); SFX.boss();
    floater(b.x+b.w/2, b.y-16, '"Voel mijn schaduw!"', '#d9f'); }
  // hulptroepen
  if(b.hp < b.maxHp*0.66 && !b.opgeroepen.p66){
    b.opgeroepen.p66 = true; roepKrijgers(b);
  }
  if(b.hp < b.maxHp*0.33 && !b.opgeroepen.p33){
    b.opgeroepen.p33 = true; roepKrijgers(b);
  }
  if(overlap(b,p)) raakSpeler(15, b.x+b.w/2);
}
function roepKrijgers(b){
  floater(b.x+b.w/2, b.y-16, '"Soldaten! Pak ze!"', '#d9f');
  for(const d of [-60, 60]){
    const e = maakVijand('krijger', b.x+d, b.y+b.h);
    poef(e.x+12, e.y+20, '#a5f', 10);
    game.enemies.push(e);
  }
}

/* ---------------- Projectielen, valstrikken, deeltjes ---------------- */
function updateProjs(dt){
  const f = dt*60, p = game.player;
  for(const pr of game.projs){
    pr.t -= dt;
    pr.vy += (pr.grav||0)*f;
    pr.x += pr.vx*f; pr.y += pr.vy*f;
    if(pr.t<=0){ pr.weg=true; continue; }
    const c = tileAtPx(pr.x+pr.w/2, pr.y+pr.h/2);
    if(solidChar(c)){ pr.weg=true; poef(pr.x,pr.y,'#ccc',4); continue; }
    if(pr.vriend){
      for(const e of game.enemies){
        if(e.dood) continue;
        if(pr.type==='golf' && pr.geraakt.includes(e)) continue;
        if(overlap(pr,e)){
          raakVijand(e, pr.dmg, Math.sign(pr.vx));
          if(pr.type==='golf') pr.geraakt.push(e); else { pr.weg=true; break; }
        }
      }
      if(!pr.weg && game.boss && !game.boss.dood && overlap(pr,game.boss)){
        if(pr.type==='golf'){ if(!pr.geraakt.includes(game.boss)){ raakBaas(pr.dmg); pr.geraakt.push(game.boss); } }
        else { raakBaas(pr.dmg); pr.weg=true; }
      }
      if(!pr.weg){
        for(const it of game.items){
          if(it.type==='kooi' && !it.open && overlap(pr,it)){ raakKooi(it); if(pr.type!=='golf') pr.weg=true; break; }
        }
      }
    } else {
      if(overlap(pr,p)){ raakSpeler(pr.dmg, pr.x); pr.weg=true; }
    }
  }
  game.projs = game.projs.filter(pr=>!pr.weg);
  // valstrikken
  for(const tr of game.traps){
    for(const e of game.enemies){
      if(!e.dood && overlap(tr,e)){
        tr.weg = true; raakVijand(e, 32*dmgMult(p), 0);
        poef(tr.x+13,tr.y,'#9d6',10);
        break;
      }
    }
    if(!tr.weg && game.boss && !game.boss.dood && overlap(tr,game.boss)){
      tr.weg = true; raakBaas(32*dmgMult(p)); poef(tr.x+13,tr.y,'#9d6',10);
    }
  }
  game.traps = game.traps.filter(t=>!t.weg);
  // tijdelijke rotsen
  for(const tr of game.tempRocks){
    tr.t -= dt;
    if(tr.t<=0 && tile(tr.tx,tr.ty)==='R'){
      game.level.grid[tr.ty][tr.tx]=' ';
      poef(tr.tx*TILE+16, tr.ty*TILE+16, '#b97', 6);
    }
  }
  game.tempRocks = game.tempRocks.filter(t=>t.t>0);
  // deeltjes & zwevende teksten
  for(const pa of game.parts){ pa.life-=dt; pa.x+=pa.vx*f; pa.y+=pa.vy*f; pa.vy+=0.06*f; }
  game.parts = game.parts.filter(pa=>pa.life>0);
  for(const fl of game.floaters){ fl.t-=dt; fl.y-=0.5*f; }
  game.floaters = game.floaters.filter(fl=>fl.t>0);
  for(const gv of game.gevangenen){ gv.t-=dt; gv.x-=1.6*f; }
  game.gevangenen = game.gevangenen.filter(g=>g.t>0);
}

/* ---------------- Paardrit ---------------- */
function bouwRit(){
  const obs=[]; let d=700;
  const pat=[[420,'rots'],[380,'hek'],[300,'struik'],[520,'rots'],[340,'hek'],
             [460,'struik'],[300,'rots'],[420,'hek'],[360,'struik'],[480,'rots'],
             [320,'hek'],[440,'struik']];
  for(const [gap,t] of pat){ d+=gap; obs.push({x:d, type:t}); }
  const coins=[];
  for(let i=0;i<13;i++){
    const cxp = 950+i*340;
    for(let j=0;j<3;j++) coins.push({x:cxp+j*42, y: j===1 ? 360 : 396, gepakt:false});
  }
  game.camX = 0; game.camY = 0; // floaters/deeltjes in schermcoördinaten
  game.parts = []; game.floaters = [];
  return { dist:0, snelheid:5.2, y:0, vy:0, onG:true, obs, coins,
    finish:d+800, inv:0, animT:0 };
}
function updateRit(dt){
  const r = game.ride, p = game.player, f = dt*60;
  r.animT += dt;
  r.dist += r.snelheid*f;
  r.inv -= dt;
  // springen
  if(r.onG && hit('arrowup','w',' ')){ r.vy = -12; r.onG = false; SFX.spring(); }
  if(!r.onG){
    r.vy += 0.55*f; r.y += r.vy*f;
    if(r.y>=0){ r.y=0; r.vy=0; r.onG=true; }
  }
  // eten kan ook op het paard
  if(hit('1')) eet();
  if(hit('2')) drink();
  if(hit('3')) gebruikLevensmiddel();
  // honger
  p.honger -= dt*100/240;
  if(p.honger<=0){ p.honger=0; p.hongerT=(p.hongerT||0)+dt;
    if(p.hongerT>1){ p.hongerT=0; p.hp-=4; if(p.hp<=0){ sterf(); return; } } }
  // botsing met obstakels (paard staat op schermx 180)
  const horseX = 180, horseW = 70;
  for(const o of r.obs){
    const sx = o.x - r.dist + horseX;
    if(sx > horseX-40 && sx < horseX+horseW && r.y > -55 && r.inv<=0){
      r.inv = 1.2; p.hp -= 8; p.score = Math.max(0,p.score-5);
      floater(horseX+30, 380, 'Boem! Au!', '#f88'); SFX.au();
      poef(horseX+40, 420, '#cb9', 8);
      if(p.hp<=0){ sterf(); return; }
    }
  }
  // munten
  for(const cn of r.coins){
    const sx = cn.x - r.dist + horseX;
    if(!cn.gepakt && sx>horseX && sx<horseX+horseW){
      const horseTopY = 420 - 56 + r.y;
      if(Math.abs(cn.y - horseTopY) < 60){
        cn.gepakt = true; p.mun += 5; p.score += 10;
        floater(sx, cn.y-10, '+5 mun', '#ffd700'); SFX.munt();
      }
    }
  }
  // finish
  if(r.dist >= r.finish){ p.score += 250; volgendeFase(); }
}

/* ---------------- Flow ---------------- */
function volgendeFase(){
  game.flowIdx++;
  const item = FLOW[game.flowIdx];
  if(!item){ game.state='victory'; return; }
  startFase(item);
}
function startFase(item){
  keysHit = {};
  if(item.type==='story'){
    game.storySlides = VERHALEN[item.key]; game.storyIdx = 0; game.state='story';
  } else if(item.type==='level'){
    laadLevel(item.key);
  } else if(item.type==='select'){
    game.selIdx = 0; game.state='select';
  } else if(item.type==='weapons'){
    game.wapenSel = []; game.state='weapons';
  } else if(item.type==='shop'){
    game.state='shop';
  } else if(item.type==='ride'){
    game.ride = bouwRit(); game.state='ride';
  } else if(item.type==='cutscene'){
    startCutscene(item.key);
  } else if(item.type==='victory'){
    const p = game.player;
    if(p.score>game.hi){ game.hi=p.score; localStorage.setItem('rinmi_hi',''+game.hi); }
    game.state='victory';
  }
}
function startSpel(){
  game.player = nieuwSpeler('rinmi'); // proloog speel je als jonge Rinmi
  game.flowIdx = -1;
  game.hintHonger = false;
  volgendeFase();
}
function kiesPersonage(key){
  const oud = game.player;
  const p = nieuwSpeler(key);
  // voortgang meenemen uit de proloog
  p.score = oud.score; p.mun = oud.mun; p.xp = oud.xp; p.niveau = oud.niveau;
  p.levens = oud.levens;
  // elk niveau uit de proloog geeft de nieuwe heldin wat extra hartkracht
  p.maxHp += (p.niveau-1)*10; p.hp = p.maxHp;
  game.player = p;
  volgendeFase();
}

function rect(x,y,w,h,kleur){ cx.fillStyle=kleur; cx.fillRect(Math.round(x),Math.round(y),Math.round(w),Math.round(h)); }
function rpath(x,y,w,h,r){
  r = Math.min(r, w/2, h/2);
  cx.beginPath();
  cx.moveTo(x+r,y); cx.arcTo(x+w,y,x+w,y+h,r); cx.arcTo(x+w,y+h,x,y+h,r);
  cx.arcTo(x,y+h,x,y,r); cx.arcTo(x,y,x+w,y,r); cx.closePath();
}
function rrect(x,y,w,h,r,fill,stroke,lw){
  rpath(x,y,w,h,r);
  if(fill){ cx.fillStyle=fill; cx.fill(); }
  if(stroke){ cx.strokeStyle=stroke; cx.lineWidth=lw||2; cx.stroke(); }
}
function glow(x,y,r,kleur){
  const g=cx.createRadialGradient(x,y,0,x,y,r);
  g.addColorStop(0,kleur); g.addColorStop(1,'rgba(0,0,0,0)');
  cx.fillStyle=g; cx.beginPath(); cx.arc(x,y,r,0,7); cx.fill();
}
function tekst(t,x,y,size,kleur,align,vet){
  cx.font = (vet?'bold ':'')+size+'px "Trebuchet MS",Verdana,sans-serif';
  cx.textAlign = align||'left';
  if(size>=20){ cx.fillStyle='rgba(0,0,0,0.35)'; cx.fillText(t,x+2,y+2); }
  cx.fillStyle = kleur||'#fff';
  cx.fillText(t,x,y);
  cx.textAlign = 'left';
}
function knop(x,y,w,h,label,fn,actief){
  if(actief) glow(x+w/2, y+h/2, w*0.62, 'rgba(120,190,255,0.18)');
  const g = cx.createLinearGradient(0,y,0,y+h);
  if(actief){ g.addColorStop(0,'#4f86c6'); g.addColorStop(1,'#2f5e98'); }
  else { g.addColorStop(0,'#33455e'); g.addColorStop(1,'#222f44'); }
  rrect(x,y,w,h,12,g, actief?'#bfe0ff':'#5b7493', 2);
  rrect(x+3,y+3,w-6,h*0.42,8,'rgba(255,255,255,0.10)');
  tekst(label, x+w/2, y+h/2+5, 15, '#fff', 'center', true);
  uiButtons.push({x,y,w,h,fn});
}

  rect(2,hh-16+Math.min(0,-loop),6,16-Math.min(0,-loop),c.pak);

  const voet = p.charKey==='rinmi' ? c.huid : '#3a2a1a';
  rect(-9,hh-4,8,4,voet); rect(1,hh-4,8,4,voet);

  rrect(-9,12,18,hh-26,4,c.pak2);

function tekenItem(it){
  const sx = it.x-game.camX, sy = it.y-game.camY;
  const zweef = Math.sin(game.tijd*3+it.x)*3;
  if(it.type==='munt'){
    cx.fillStyle='#ffd700';
    cx.beginPath(); cx.ellipse(sx+8,sy+8+zweef,8,8,0,0,7); cx.fill();
    cx.fillStyle='#c8a000';
    tekst('m', sx+8, sy+13+zweef, 11, '#a07800', 'center', true);
  } else if(it.type==='levens'){
    rect(sx,sy+4+zweef,20,14,'#e8e8e8');
    rect(sx+2,sy+6+zweef,16,10,'#9f9');
    rect(sx+8,sy+zweef,4,5,'#c66');
  } else if(it.type==='eten'){
    rect(sx,sy+4+zweef,20,13,'#c08040');
    rect(sx,sy+4+zweef,20,4,'#e8b060');
    rect(sx+8,sy+4+zweef,4,13,'#8a5020');
  } else if(it.type==='water'){
    rect(sx+2,sy+6+zweef,12,18,'#bee6f5');
    rect(sx+4,sy+10+zweef,8,12,'#5ab0e0');
    rect(sx+5,sy+2+zweef,6,5,'#888');
  } else if(it.type==='steen'){
    cx.fillStyle='#aab';
    cx.beginPath(); cx.ellipse(sx+9,sy+9+zweef,9,7,0,0,7); cx.fill();
    cx.fillStyle='#dde'; cx.fillRect(sx+5,sy+5+zweef,4,3);
  } else if(it.type==='kooi'){
    if(it.open){
      rect(sx,sy+it.h-6,it.w,6,'#7a5a3c');
      rect(sx,sy,4,it.h,'#7a5a3c'); // open deur: alleen frame
    } else {
      rect(sx,sy,it.w,4,'#6a5a48'); rect(sx,sy+it.h-4,it.w,4,'#6a5a48');
      for(let i=0;i<5;i++) rect(sx+2+i*8,sy,4,it.h,'#8a7a64');
      tekenGevangene({}, sx+10, sy+12);
      // barstjes als de kooi al geraakt is
      if(it.hp<3){ cx.strokeStyle='#fff'; cx.lineWidth=1;
        cx.beginPath(); cx.moveTo(sx+8,sy+8); cx.lineTo(sx+16,sy+20); cx.stroke(); }
    }
  } else if(it.type==='uitgang'){
    const open = doelKlaar();
    const gloed = open ? 0.5+Math.sin(game.tijd*4)*0.3 : 0.15;
    cx.fillStyle = open ? `rgba(120,220,255,${gloed})` : 'rgba(120,120,120,0.4)';
    cx.beginPath(); cx.ellipse(sx+16,sy+32,16,32,0,0,7); cx.fill();
    cx.strokeStyle = open ? '#8df' : '#777'; cx.lineWidth=3;
    cx.beginPath(); cx.ellipse(sx+16,sy+32,16,32,0,0,7); cx.stroke();
    if(!open){
      tekst('🔒', sx+16, sy+38, 18, '#fff', 'center');
      const L = game.level;
      let nog = '';
      if(L.doel==='kooien') nog = 'nog '+L.kooien+' kooi'+(L.kooien===1?'':'en');
      if(L.doel==='training') nog = 'training afmaken!';
      tekst(nog, sx+16, sy-6, 11, '#fff', 'center');
    }
  } else if(it.type==='oma'){
    tekenOma(sx, sy);
    tekst('E', sx+12, sy-12, 12, '#fff', 'center', true);
  }
}

}

/* ---------------- HUD ---------------- */
function balk(x,y,w,h,frac,kleurV,kleurA,label){
  const r = Math.min(h/2,7);
  rrect(x,y,w,h,r,'rgba(0,0,0,0.45)');
  const fw = (w-4)*clamp(frac,0,1);
  if(fw>2){
    cx.save(); rpath(x+2,y+2,fw,h-4,Math.max(2,r-2)); cx.clip();
    const g=cx.createLinearGradient(0,y,0,y+h);
    g.addColorStop(0, kleurV); g.addColorStop(1, 'rgba(0,0,0,0.25)');
    cx.fillStyle=g; cx.fillRect(x,y,fw+4,h);
    cx.fillStyle='rgba(255,255,255,0.25)'; cx.fillRect(x+2,y+2,fw,Math.max(2,(h-4)/2));
    cx.restore();
  }
  rrect(x,y,w,h,r,null,kleurA||'rgba(255,255,255,0.25)',1);
  if(label){ cx.fillStyle='rgba(0,0,0,0.5)'; cx.font='bold 10px "Trebuchet MS",Verdana';
    cx.textAlign='center'; cx.fillText(label,x+w/2+1,y+h-2.5);
    cx.fillStyle='#fff'; cx.fillText(label,x+w/2,y+h-3.5); cx.textAlign='left'; }
}

function tekenHud(){
  hudButtons = [];
  const p = game.player, L = game.level;
  const fase = FLOW[game.flowIdx];
  const inRide = fase && fase.type==='ride';
  const c = CHARS[p.charKey];

  // ---- linksboven: HP / honger / levens ----
  rrect(8,8,212,68,12,'rgba(10,16,28,0.55)');
  balk(16,14,184,16, p.hp/p.maxHp, p.hp>p.maxHp*0.3?'#5ec56a':'#e85a5a', 'rgba(255,255,255,0.25)',
       'HP '+Math.ceil(p.hp)+'/'+p.maxHp);
  balk(16,34,184,14, p.honger/100, p.honger>30?'#e8a830':'#e85a5a', 'rgba(255,255,255,0.25)',
       'Honger '+Math.ceil(p.honger));
  for(let i=0;i<Math.min(p.levens,6);i++){
    const hx=16+i*16, hy=56; cx.fillStyle='#ee5a6a';
    cx.beginPath(); cx.ellipse(hx+4,hy+3,4,4,0,0,7); cx.ellipse(hx+10,hy+3,4,4,0,0,7); cx.fill();
    cx.beginPath(); cx.moveTo(hx-1,hy+5); cx.lineTo(hx+7,hy+13); cx.lineTo(hx+15,hy+5); cx.fill();
  }
  // ---- midden: levelnaam + doel ----
  if(L && fase && fase.type==='level'){
    let doel = L.doelTekst;
    if(L.doel==='kooien') doel += ' ('+(3-L.kooien)+'/3)';
    if(L.doel==='training') doel = 'Stenen: '+(3-L.stenen)+'/3 · Poppen: '+(2-L.poppen)+'/2';
    tekst(L.naam, W/2, 24, 14, '#eaf4ff', 'center', true);
    tekst(doel, W/2, 42, 11, '#cfe0f0', 'center');
  } else if(inRide){
    tekst('Naar Akuma’s huis', W/2, 24, 14, '#eaf4ff', 'center', true);
  }
  // ---- rechtsboven: mun / score / xp + pauze ----
  rrect(W-228,8,176,60,12,'rgba(10,16,28,0.55)');
  tekst('Mun '+p.mun, W-62, 26, 14, '#ffd95a', 'right', true);
  tekst('Score '+p.score, W-62, 44, 12, '#dfeaf5', 'right');
  balk(W-220,52,158,11, p.xp/xpNodig(p), '#8a9cf5', 'rgba(255,255,255,0.2)', 'Niv '+p.niveau);
  // pauzeknop
  chip(W-46,12,36,36,false,()=>{ game.state='pause'; });
  rect(W-36,20,5,20,'#dfeaf5'); rect(W-26,20,5,20,'#dfeaf5');

  // ---- linksonder: inventaris (tikbaar) ----
  const iy=H-50, iw=70, ih=40;
  chip(12,iy,iw,ih, p.inv.eten>0, ()=>eet()); ikoonEten(34,iy+20);
  tekst('×'+p.inv.eten, 48,iy+26,15,'#fff',null,true);
  chip(12+iw+6,iy,iw,ih, p.inv.water>0, ()=>drink()); ikoonWater(12+iw+6+22,iy+20);
  tekst('×'+p.inv.water, 12+iw+6+38,iy+26,15,'#fff',null,true);
  chip(12+(iw+6)*2,iy,iw,ih, p.inv.levens>0, ()=>gebruikLevensmiddel()); ikoonKruis(12+(iw+6)*2+22,iy+20);
  tekst('×'+p.inv.levens, 12+(iw+6)*2+38,iy+26,15,'#fff',null,true);
  if(!isTouch) tekst('toetsen 1 · 2 · 3', 16, H-56, 10, '#9fb4c8');

  if(!inRide){
    // ---- rechtsonder: wapen-chip + gave-orb ----
    const w1 = WAPENS[p.wapens[p.wapenIdx]];
    const wx=W-220, wy=H-50, ww=118, wh=40;
    chip(wx,wy,ww,wh, true, ()=>{ p.wapenIdx=(p.wapenIdx+1)%p.wapens.length;
      floater(p.x+p.w/2,p.y-14,WAPENS[p.wapens[p.wapenIdx]].naam,'#fff'); });
    tekst(w1.naam, wx+ww/2, wy+17, 12, '#ffe', 'center', true);
    tekst(isTouch?'tik = wisselen':'[C] wisselen', wx+ww/2, wy+32, 10, '#9fb4c8', 'center');
    // gave-orb met cooldown-ring
    const gx=W-52, gy=H-30, gr=30, klaar=p.gaveCd<=0;
    if(klaar) glow(gx,gy,gr+10, 'rgba(120,210,255,'+(0.25+0.15*Math.sin(game.tijd*6))+')');
    cx.lineWidth=5; cx.strokeStyle='rgba(255,255,255,0.15)';
    cx.beginPath(); cx.arc(gx,gy,gr,0,7); cx.stroke();
    const frac = klaar?1:clamp(1 - p.gaveCd/c.gaveCd,0,1);
    cx.strokeStyle = klaar?'#7ee0a0':'#8ac0ff';
    cx.beginPath(); cx.arc(gx,gy,gr,-Math.PI/2,-Math.PI/2+frac*6.283); cx.stroke();
    rrect(gx-gr+5,gy-gr+5,(gr-5)*2,(gr-5)*2,gr-5, klaar?'rgba(40,80,70,0.85)':'rgba(30,40,60,0.85)');
    tekst('✦', gx, gy-2, 22, klaar?'#bfffd6':'#7e92b0', 'center', true);
    tekst(c.gave, gx, gy+16, 9, klaar?'#bfffd6':'#8aa0bc', 'center', true);
    hudButtons.push({x:gx-gr,y:gy-gr,w:gr*2,h:gr*2,fn:()=>gebruikGave()});
  } else {
    tekst(isTouch?'Veeg omhoog = springen':'Spatie = springen', W-150, H-30, 13, '#dfeaf5', 'center', true);
  }

  // ---- bazenbalk ----
  if(game.boss && !game.boss.dood){
    rrect(W/2-224,84,448,26,8,'rgba(10,6,18,0.6)');
    glow(W/2,97,160,'rgba(150,60,240,0.15)');
    balk(W/2-218,88,436,18, game.boss.hp/game.boss.maxHp, '#9a3af0', '#d9b6ff',
      '☠ AKUMA — '+Math.max(0,Math.ceil(game.boss.hp))+' HP');
  }
}

    cx.globalAlpha = 1;
  }
}
function tekenParts(){
  for(const pa of game.parts){
    cx.globalAlpha = Math.max(0,Math.min(1,pa.life*2));
    if(pa.ster){
      cx.fillStyle = pa.kleur;
      const x=pa.x-game.camX, y=pa.y-game.camY, s=pa.size;
      cx.beginPath();
      cx.moveTo(x,y-s); cx.lineTo(x+s*0.4,y-s*0.3); cx.lineTo(x+s,y);
      cx.lineTo(x+s*0.4,y+s*0.3); cx.lineTo(x,y+s); cx.lineTo(x-s*0.4,y+s*0.3);
      cx.lineTo(x-s,y); cx.lineTo(x-s*0.4,y-s*0.3); cx.fill();
    } else {
      rect(pa.x-game.camX, pa.y-game.camY, pa.size, pa.size, pa.kleur);
    }
    cx.globalAlpha = 1;
  }
}

/* ---------------- Donkere grot ---------------- */
const darkCv = document.createElement('canvas');
darkCv.width = W; darkCv.height = H;
const darkCx = darkCv.getContext('2d');
function tekenDonker(){
  const p = game.player;
  darkCx.clearRect(0,0,W,H);
  darkCx.fillStyle = 'rgba(4,2,12,0.82)';
  darkCx.fillRect(0,0,W,H);
  const sx = p.x+p.w/2-game.camX, sy = p.y+p.h/2-game.camY;
  const gr = darkCx.createRadialGradient(sx,sy,40,sx,sy,230);
  gr.addColorStop(0,'rgba(0,0,0,1)');
  gr.addColorStop(1,'rgba(0,0,0,0)');
  darkCx.globalCompositeOperation = 'destination-out';
  darkCx.fillStyle = gr;
  darkCx.fillRect(0,0,W,H);
  darkCx.globalCompositeOperation = 'source-over';
  cx.drawImage(darkCv,0,0);
}

/* ---------------- Speelveld tekenen ---------------- */
function tekenSpel(){
  const sh = game.shake||0;
  const ox = sh? (Math.random()*2-1)*sh : 0, oy = sh? (Math.random()*2-1)*sh : 0;
  cx.save(); cx.translate(ox,oy);
  tekenLucht(game.level.theme);
  tekenTegels();
  for(const tr of game.traps){
    rect(tr.x-game.camX, tr.y-game.camY+4, tr.w, 6, '#9d6');
    rect(tr.x-game.camX+4, tr.y-game.camY, 4, 6, '#7a5');
    rect(tr.x-game.camX+18, tr.y-game.camY, 4, 6, '#7a5');
  }
  for(const it of game.items) if(!it.gepakt) tekenItem(it);
  for(const gv of game.gevangenen) tekenGevangene(gv, gv.x-game.camX, gv.y-game.camY);
  for(const e of game.enemies) if(!e.dood) tekenVijand(e, e.x-game.camX, e.y-game.camY);
  if(game.boss) tekenBaas(game.boss, game.boss.x-game.camX, game.boss.y-game.camY);
  tekenHeld(game.player, game.player.x-game.camX, game.player.y-game.camY);
  for(const pr of game.projs) tekenProj(pr);
  tekenParts();
  tekenFloaters();
  if(game.level.theme==='grot') tekenDonker();
  cx.restore();
  tekenSfeer(game.level.theme);
  tekenVignet(game.level.theme==='grot'?0.55:0.85);
  tekenHud();
  if(isTouch) tekenTouchOverlay();
}

/* ---------------- Touch-overlay (joystick + gebaren) ---------------- */
function tekenTouchOverlay(){
  for(const r of T.ripples){
    const a = clamp(r.t/0.45,0,1);
    cx.globalAlpha = a*0.75;
    cx.strokeStyle = r.kind==='gave'?'#9be0ff':(r.kind==='jump'?'#bfffd6':'#ffffff');
    cx.lineWidth=3;
    cx.beginPath(); cx.arc(r.x, r.y, (1-a)*32+8, 0, 7); cx.stroke();
    if(r.kind==='jump'){
      cx.beginPath(); cx.moveTo(r.x,r.y+8); cx.lineTo(r.x,r.y-12);
      cx.moveTo(r.x-6,r.y-4); cx.lineTo(r.x,r.y-13); cx.lineTo(r.x+6,r.y-4); cx.stroke();
    }
    cx.globalAlpha=1;
  }
  if(T.active){
    cx.globalAlpha=0.55;
    cx.fillStyle='rgba(255,255,255,0.10)'; cx.beginPath(); cx.arc(T.baseX,T.baseY,46,0,7); cx.fill();
    cx.strokeStyle='rgba(220,240,255,0.6)'; cx.lineWidth=3; cx.beginPath(); cx.arc(T.baseX,T.baseY,46,0,7); cx.stroke();
    const kx=clamp(T.curX,T.baseX-42,T.baseX+42), ky=clamp(T.curY,T.baseY-42,T.baseY+42);
    glow(kx,ky,26,'rgba(150,210,255,0.35)');
    cx.fillStyle='rgba(195,228,255,0.85)'; cx.beginPath(); cx.arc(kx,ky,20,0,7); cx.fill();
    cx.globalAlpha=1;
  }
  if(!T.hintGezien){
    cx.globalAlpha=0.55+0.2*Math.sin(game.tijd*4);
    tekst('joystick: lopen', W*0.23, H-78, 14, '#dffaff', 'center', true);
    tekst('tik = aanval   veeg ↑ = springen   veeg ↓ = gave', W*0.72, H-78, 13, '#dffaff', 'center', true);
    cx.globalAlpha=1;
  }
}

    cx.beginPath(); cx.moveTo(bx,460); cx.lineTo(bx+210,180); cx.lineTo(bx+420,460); cx.fill();

  cx.fillStyle='#88b868';

  }

      rect(sx+8,438,4,4,'#e05080'); rect(sx+24,442,4,4,'#e05080');

    cx.fillStyle='#e04040';
    cx.beginPath(); cx.moveTo(fx+6,330); cx.lineTo(fx+58,345); cx.lineTo(fx+6,362); cx.fill();
  }
  // paard + ruiter

  cx.translate(hx,hy);
  cx.fillStyle = r.inv>0 && Math.floor(game.tijd*12)%2===0 ? '#caa' : '#8a5a30';
  // benen
  rect(8,28,6,22+been,cx.fillStyle); rect(22,28,6,22-been,cx.fillStyle);
  rect(44,28,6,22-been,cx.fillStyle); rect(56,28,6,22+been,cx.fillStyle);
  // lijf
  rect(2,8,66,26,cx.fillStyle);
  // hals & hoofd
  rect(58,-12,12,24,cx.fillStyle);
  rect(60,-20,20,14,cx.fillStyle);
  rect(74,-16,3,3,'#241509');
  // manen & staart
  rect(56,-16,5,22,'#4a2a10');
  cx.strokeStyle='#4a2a10'; cx.lineWidth=4;
  cx.beginPath(); cx.moveTo(2,12); cx.quadraticCurveTo(-12,22,-8,40); cx.stroke();
  cx.restore();
  // ruiter (gekozen heldin) bovenop
  const fake = Object.assign({}, p, {x:0, y:0, vx:0, vy:0, onGround:true, loopT:0, atkAnim:0, invuln:0});
  const oudCamX = game.camX, oudCamY = game.camY;

    cx.beginPath(); cx.arc(140+Math.sin(game.tijd*10)*4, 470, 6+Math.random()*4, 0, 7); cx.fill();

/* ============================================================
   CUTSCENES — cinematische tussenfilmpjes
   ============================================================ */
function hexRGB(h){ h=h.replace('#',''); if(h.length===3) h=h.split('').map(c=>c+c).join('');
  return [parseInt(h.slice(0,2),16),parseInt(h.slice(2,4),16),parseInt(h.slice(4,6),16)]; }
function mix(a,b,t){ t=clamp(t,0,1); const A=hexRGB(a),B=hexRGB(b);
  return 'rgb('+Math.round(A[0]+(B[0]-A[0])*t)+','+Math.round(A[1]+(B[1]-A[1])*t)+','+Math.round(A[2]+(B[2]-A[2])*t)+')'; }
const CUT = { rain:[], blos:[], fw:[], spark:[], seeded:'' };
function cutSeed(key){
  if(CUT.seeded===key) return;
  CUT.seeded=key; CUT.rain=[]; CUT.blos=[]; CUT.fw=[]; CUT.spark=[];
  if(key==='opening') for(let i=0;i<150;i++) CUT.rain.push({x:Math.random()*W*1.3, y:Math.random()*H, l:10+Math.random()*14, s:9+Math.random()*6});
  if(key==='finale') for(let i=0;i<80;i++) CUT.blos.push({x:Math.random()*W, y:Math.random()*H, vx:-0.6-Math.random()*1.6, vy:0.6+Math.random()*1.5, r:Math.random()*6.28, vr:(Math.random()-0.5)*0.12, s:4+Math.random()*6});
  if(key==='akuma') for(let i=0;i<60;i++) CUT.blos.push({x:Math.random()*W, y:Math.random()*H, vx:-0.3-Math.random()*0.9, vy:0.4+Math.random()*0.9, r:Math.random()*6.28, vr:(Math.random()-0.5)*0.08, s:3+Math.random()*4});
}
function ster(x,y,s,a){ cx.globalAlpha=a; cx.fillStyle='#fff'; cx.beginPath(); cx.arc(x,y,s,0,7); cx.fill(); cx.globalAlpha=1; }
function bergen(baseY, kleur, n, seed){
  cx.fillStyle=kleur; cx.beginPath(); cx.moveTo(0,H);
  for(let i=0;i<=n;i++){ const x=i/n*W, h=baseY-(Math.sin(i*1.7+seed)*0.5+0.5)*130-30; cx.lineTo(x,h); }
  cx.lineTo(W,H); cx.fill();
}
function regenUpdate(dt){ const f=dt*60; for(const d of CUT.rain){ d.y+=d.s*f; d.x-=d.s*0.35*f; if(d.y>H){ d.y=-10; d.x=Math.random()*W*1.3; } } }
function regenTeken(a){ cx.strokeStyle='rgba(180,210,255,'+a+')'; cx.lineWidth=2; cx.beginPath();
  for(const d of CUT.rain){ cx.moveTo(d.x,d.y); cx.lineTo(d.x-d.l*0.35,d.y+d.l); } cx.stroke(); }
function flits(t, momenten){
  let a=0; for(const m of momenten){ const d=t-m; if(d>=0 && d<0.5) a=Math.max(a,(0.5-d)/0.5*(Math.floor(d*30)%2?0.7:0.25)); }
  if(a>0){ cx.fillStyle='rgba(232,242,255,'+a+')'; cx.fillRect(0,0,W,H); }
  return a;
}
function bliksem(x, top, bot, a){
  cx.strokeStyle='rgba(235,245,255,'+a+')'; cx.lineWidth=2.5; cx.beginPath();
  let y=top, c=x; cx.moveTo(x,top);
  while(y<bot){ y+=18+Math.random()*22; c+=(Math.random()-0.5)*44; cx.lineTo(c,y); } cx.stroke();
}
function figuur(x,y,h,kleur){ cx.fillStyle=kleur;
  cx.beginPath(); cx.arc(x,y-h,h*0.2,0,7); cx.fill();
  rrect(x-h*0.17,y-h*0.84,h*0.34,h*0.7,h*0.12,kleur); }
function vuurwerk(dt){
  const f=dt*60;
  if(Math.random()<0.05) CUT.fw.push({x:120+Math.random()*(W-240), y:H, vy:-7.5-Math.random()*3,
    kleur:['#ff6a6a','#ffd95a','#6affb0','#7ab8ff','#e07aff'][(Math.random()*5)|0]});
  for(const r of CUT.fw){ r.y+=r.vy*f; r.vy+=0.12*f;
    cx.fillStyle=r.kleur; cx.beginPath(); cx.arc(r.x,r.y,2.5,0,7); cx.fill();
    if(r.vy>=-1){ r.knal=true; for(let i=0;i<28;i++){ const a=i/28*6.28;
      CUT.spark.push({x:r.x,y:r.y,vx:Math.cos(a)*(2+Math.random()*2.2),vy:Math.sin(a)*(2+Math.random()*2.2),life:1+Math.random()*0.6,kleur:r.kleur}); } } }
  CUT.fw=CUT.fw.filter(r=>!r.knal);
  for(const s of CUT.spark){ s.life-=dt; s.x+=s.vx*f; s.y+=s.vy*f; s.vy+=0.06*f;
    cx.globalAlpha=Math.max(0,s.life); cx.fillStyle=s.kleur; cx.beginPath(); cx.arc(s.x,s.y,2.6,0,7); cx.fill(); cx.globalAlpha=1; }
  CUT.spark=CUT.spark.filter(s=>s.life>0);
}
function blosUpdate(dt){ const f=dt*60; for(const b of CUT.blos){ b.x+=b.vx*f; b.y+=b.vy*f; b.r+=b.vr*f;
  if(b.y>H+10||b.x<-10){ b.y=-10; b.x=Math.random()*W; } } }
function blosTeken(kleur){ cx.fillStyle=kleur; for(const b of CUT.blos){ cx.save(); cx.translate(b.x,b.y); cx.rotate(b.r);
  cx.beginPath(); cx.moveTo(0,-b.s); cx.quadraticCurveTo(b.s,-b.s*0.3,0,b.s); cx.quadraticCurveTo(-b.s,-b.s*0.3,0,-b.s); cx.fill(); cx.restore(); } }

}

  opening(t,dt){

    if(dawn>0){ cx.globalAlpha=dawn; const vx=W-260;
      for(let i=0;i<3;i++){ rect(vx+i*70,320,50,40,'#5a3a26'); cx.fillStyle='#7a4a36';

      figuur(vx-28,372,46,'#3a4a4a'); cx.globalAlpha=1; }
    const ra=clamp(1-dawn,0,1)*0.5; if(ra>0.05) regenTeken(ra);
    const fa=flits(t,[1.2,2.4,5.0,6.6,9.0]); if(fa>0.2 && t<10) bliksem(W*(0.3+0.4*Math.sin(t*9)),0,300,fa);
    if(t>=8.6 && t<11.5){ cx.globalAlpha=clamp(11.5-t,0,1);

    ondertitel(t<5?'Tussen de bergen van Japan en de stille meren van Zuid-Korea...':
              t<9?'"Het water zal je dragen. Je zal een heldin worden."':
              t<12.5?'En het water droeg haar... ver, heel ver weg.':
                     'Een oude vrouw vond het kind van het water.');
    tekenVignet(0.5);

  },
  akuma(t,dt){
    const DUR=7.5; blosUpdate(dt);
    const g=cx.createLinearGradient(0,0,0,H); g.addColorStop(0,'#3a1226'); g.addColorStop(0.6,'#2a0e1e'); g.addColorStop(1,'#160810');
    cx.fillStyle=g; cx.fillRect(0,0,W,H);
    glow(W*0.72,118,150,'rgba(210,40,40,0.4)'); cx.fillStyle='#c83a3a'; cx.beginPath(); cx.arc(W*0.72,118,46,0,7); cx.fill();
    bergen(360,'#1a0c14',6,2.0);
    const px=W/2-180; rect(px,250,360,210,'#0e0610');
    cx.fillStyle='#0e0610'; cx.beginPath(); cx.moveTo(px-30,250); cx.lineTo(px+180,180); cx.lineTo(px+390,250); cx.fill();
    const march=(t*32)%44;
    for(let i=0;i<17;i++){ const sx=i*58-march, bob=Math.sin(t*6+i)*3;

      cx.fillStyle='#2a0e3a'; rrect(ax-62,ay,124,260,22,'#2a0e3a');

      glow(ax-16,ay-24,22,'rgba(255,120,30,0.85)'); glow(ax+16,ay-24,22,'rgba(255,120,30,0.85)');

  finale(t,dt){

      const gl=0.6+0.4*Math.sin(t*5); glow(W/2-28,376,30,'rgba(255,220,120,'+(0.5*gl)+')');

      rrect(sx+95,360,52,90,4,'#3a2418'); tekst('RINMI', W/2, 338, 24, '#ffe','center',true);
      for(let i=0;i<6;i++){ const kx=(i*120+t*70)%(W+80)-40; figuur(kx,442,28,['#b06a3a','#c43030','#5a7a3a','#7ab8e0','#8a7a66','#e0a050'][i]); }
    }
    blosTeken('rgba(255,200,225,0.88)');
    ondertitel(t<4?'"Hierbij maak ik Rinmi keizerin en beschermer van Korea."':
              t<8?'Korea is bevrijd! En ze trouwden onder de kersenbloesem.':

};
function startCutscene(key){ cutSeed(key); game.cut={key,t:0}; game.state='cutscene'; keysHit={}; }
function eindCutscene(){ game.cut=null; CUT.seeded=''; volgendeFase(); }
function tekenCutscene(dt){
  uiButtons=[];
  const c=game.cut; c.t+=dt;
  const klaar = CUTSCENES[c.key](c.t, dt);
  cx.globalAlpha=0.6+0.2*Math.sin(game.tijd*4);
  tekst(isTouch?'tik om over te slaan':'Enter = overslaan', W-16, 28, 12, '#fff', 'right');
  cx.globalAlpha=1;
  uiButtons.push({x:0,y:0,w:W,h:H,fn:eindCutscene});
  if(klaar || (c.t>0.4 && hit('enter',' '))) eindCutscene();
}

/* ---------------- Hoofdlus ---------------- */
let vorigeTijd = performance.now();
function lus(nu){
  let dt = Math.min(0.033, (nu-vorigeTijd)/1000);
  vorigeTijd = nu;
  game.tijd += dt;
  updateSfeer(dt);
  // gebaar-rimpels laten vervagen
  for(const r of T.ripples) r.t -= dt;
  if(T.ripples.length) T.ripples = T.ripples.filter(r=>r.t>0);
  // hitstop: bevries de simulatie heel even bij grote klappen
  if(game.hitstop>0){ game.hitstop -= dt; dt = 0; }

  switch(game.state){
    case 'title':    tekenTitel(); break;
    case 'help':     tekenHelp(); break;
    case 'story':    tekenVerhaal(); break;
    case 'select':   tekenSelect(); break;
    case 'weapons':  tekenWapens(); break;
    case 'shop':     tekenWinkel(); break;
    case 'levelup':  tekenLevelup(); break;
    case 'stats':    tekenStats(); break;
    case 'dialog':   tekenDialoog(); break;
    case 'pause':    tekenPauze(); break;
    case 'gameover': tekenGameover(); break;
    case 'victory':  tekenVictory(); break;
    case 'cutscene': tekenCutscene(dt); break;
    case 'play': {
      if(hit('p','escape')){ game.state='pause'; break; }
      updateSpeler(dt);
      if(game.state!=='play' && game.state!=='levelup' && game.state!=='dialog' && game.state!=='stats'){
        // overgang (dood/level klaar) — teken nog wel het juiste scherm volgende frame
      }
      if(game.state==='play' || game.state==='levelup' || game.state==='dialog' || game.state==='stats'){
        for(const e of game.enemies) if(!e.dood) updateVijand(e, dt);
        game.enemies = game.enemies.filter(e=>!e.dood);
        if(game.boss) updateBaas(dt);
        updateProjs(dt);
      }
      if(game.state==='play') tekenSpel();
      else if(game.state==='levelup') tekenLevelup();
      else if(game.state==='dialog') tekenDialoog();
      else if(game.state==='stats') tekenStats();
      break;
    }
    case 'ride': {
      if(hit('p','escape')){ game.state='pause'; break; }
      updateRit(dt);
      updateProjs(dt); // voor floaters/deeltjes
      if(game.state==='ride') tekenRit();
      else if(game.state==='levelup') tekenLevelup();
      break;
    }
  }
  keysHit = {};
  T.hits = {};
  requestAnimationFrame(lus);
}
